name: Example Image CI

on:
  pull_request:
    branches: [ "main" ]
  # Allow mannually trigger
  workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - name: install packages
              run: make install
            - name: lint it
              run: make lint
            - name: test it
              run: make test
            - name: format it
              run: make format